version: '3.8'

services:

  # ──────────────────────────────────────────────
  # 1. Base de datos MySQL
  # ──────────────────────────────────────────────
  mysql-db:
    image: mysql:8.0
    container_name: clmm-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: prueba_prfinal
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # 2. Base de datos MongoDB
  # ──────────────────────────────────────────────
  mongo-db:
    image: mongo:7.0
    container_name: clmm-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ──────────────────────────────────────────────
  # 3. Backend API (Motor de datos y persistencia)
  #    Puerto 8081 — SOLO accesible desde la red
  #    interna de Docker, NUNCA desde el exterior.
  # ──────────────────────────────────────────────
  backend-api:
    build:
      context: ./Proyecto-Final-Multiplataforma-BackApi-master
      dockerfile: Dockerfile
    container_name: clmm-backend
    restart: always
    ports:
      - "8081:8081"   # Expuesto localmente para debug; en producción se puede eliminar
    environment:
      - SERVER_PORT=8081
      - APP_FRONTEND_URL=https://warhammer-battleship-clmm.polandcentral.cloudapp.azure.com
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/prueba_prfinal?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATA_MONGODB_URI=mongodb://mongo-db:27017/batalla_naval_stats
      - SPRING_DATA_MONGODB_DATABASE=batalla_naval_stats
      # CLAVE INTERNA — debe ser IDÉNTICA a la del Middleware y a application.properties
      - INTERNAL_API_KEY=ClmmInternalSecretKey2026_NoCompartir
      - SPRING_APPLICATION_JSON={"internal.api.key":"ClmmInternalSecretKey2026_NoCompartir"}
    depends_on:
      mysql-db:
        condition: service_healthy
      mongo-db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  # ──────────────────────────────────────────────
  # 4. Middleware (Seguridad, Lógica y Socket.IO)
  #    Puerto 8080 → REST/JWT
  #    Puerto 8082 → Socket.IO (Netty)
  # ──────────────────────────────────────────────
  middleware:
    build:
      context: ./Middleware_clmm
      dockerfile: Dockerfile
    container_name: clmm-middleware
    restart: always
    ports:
      - "8080:8080"   # API REST y JWT — entrada principal del frontend
      - "8082:8082"   # Socket.IO (Netty) — partidas en tiempo real
    environment:
      - SERVER_PORT=8080
      - APP_FRONTEND_URL=https://warhammer-battleship-clmm.polandcentral.cloudapp.azure.com
      - SOCKETIO_PORT=8082
      # CLAVE INTERNA — debe ser IDÉNTICA a la del Backend y a application.properties
      - INTERNAL_API_KEY=ClmmInternalSecretKey2026_NoCompartir
      # SPRING_APPLICATION_JSON tiene máxima prioridad en Spring Boot y garantiza
      # que internal.api.key y backend.api.url lleguen aunque el relaxed binding falle
      - SPRING_APPLICATION_JSON={"internal.api.key":"ClmmInternalSecretKey2026_NoCompartir","backend.api.url":"http://backend-api:8081"}
    depends_on:
      backend-api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/api/personajes || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 50s

  # ──────────────────────────────────────────────
  # 5. Frontend Angular (Nginx)
  #    Puerto 80 — accesible desde Azure
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./front-conectado-main
      dockerfile: Dockerfile
    container_name: clmm-frontend
    restart: always
    ports:
      - "80:80"   # Puerto 80 abierto en Azure NSG
    depends_on:
      middleware:
        condition: service_healthy

# ──────────────────────────────────────────────
# Volúmenes persistentes
# ──────────────────────────────────────────────
volumes:
  mysql-data:
    driver: local
  mongo-data:
    driver: local
