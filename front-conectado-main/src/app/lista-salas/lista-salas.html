<div class="lista-salas-wrapper">
  <div class="salas-container">
    <div class="salas-header">
      <h2>lista de salas</h2>
    </div>

    <div class="salas-top-actions">
      <button class="btn-refresh" (click)="recargarSalas()" title="Recargar salas">
        <!-- SVG Icon using a reload sync icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <polyline points="1 20 1 14 7 14"></polyline>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
        </svg>
      </button>
      <button class="btn-crear" (click)="crearSala()">CREAR SALA</button>
    </div>

    <div class="salas-list">
      @for (room of filteredRooms; track room.codigoSala) {
      <div class="sala-card">
        <div class="sala-card-left">
          <div class="sala-profile-pic">
            <img [src]="room.avatarJugador1" alt="Foto perfil">
            <span class="foto-label">foto<br>perfil</span>
          </div>

          <button class="btn-unirse" (click)="unirse(room)" [disabled]="solicitandoUnirse">
            {{ solicitandoUnirse ? 'Solicitando...' : 'Unirse' }}
          </button>
        </div>
        <div class="sala-card-right">
          <span class="sala-name">Partida de {{ room.nombreJugador1 }}</span>
          <div class="sala-info">
            <span>Codigo de sala: {{ room.codigoSala }}</span>
            <span>Estado: {{ room.estado }}</span>
          </div>
        </div>
      </div>
      }

      @if (filteredRooms.length === 0) {
      <div class="no-salas">No se encontraron salas.</div>
      }
    </div>

    <div class="salas-bottom-actions">
      <input type="text" class="input-search" placeholder="Buscar sala por codigo" [(ngModel)]="searchCode">
      <button class="btn-salir" (click)="salir()">Salir</button>
    </div>
  </div>
</div>
